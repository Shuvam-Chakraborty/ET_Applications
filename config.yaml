# =============================================================================
#  ET-Applications - User Configuration File  (Direct GEE Asset Export)
#  Generates 13-band Earth Engine image assets at 30 m resolution for the
#  tehsil using a fully server-side workflow.
# =============================================================================

# -----------------------------------------------------------------------------
# GEE PROJECT
# -----------------------------------------------------------------------------
gee_project: "shuvamdownscalinget"          # Your GEE cloud project ID

# -----------------------------------------------------------------------------
# TEHSIL IDENTIFICATION
# (Used for labelling exported assets only - the actual geometry comes from
#  the GEE asset below.)
# -----------------------------------------------------------------------------
tehsil:
  state    : "UTTAR PRADESH"
  district : "BANDA"
  name     : "TELYANI"

# -----------------------------------------------------------------------------
# GEE ASSET PATHS
# -----------------------------------------------------------------------------
assets:
  # The tehsil boundary FeatureCollection.
  tehsil_asset : "projects/shuvamdownscalinget/assets/tehsil_uttar_pradesh__banda__telyani"

  # The Random Forest model for 30 m AET downscaling.
  model_aez    : "projects/shuvamdownscalinget/assets/rf_aez4_final"

# -----------------------------------------------------------------------------
# MODIS COLLECTION  (PET source)
# -----------------------------------------------------------------------------
modis:
  collection: "MODIS/061/MOD16A2GF"

# -----------------------------------------------------------------------------
# TIME PARAMETERS
# -----------------------------------------------------------------------------
time:
  year : 2022          # Year to process (Landsat 8 + MODIS + GLDAS + MCD12Q1)

# -----------------------------------------------------------------------------
# OUTPUT MODE TO RUN
# -----------------------------------------------------------------------------
# Options:
#   all          - core layers (AET, PET, GPP) + derived applications (RWDI, Kc, WUE)
#   aet          - core AET layer: monthly AET + annual total AET asset
#   pet          - core PET layer: monthly PET + annual total PET asset (MODIS)
#   gpp          - core GPP layer (LUE) + annual mean asset
#   rwdi         - derived application: monthly RWDI + annual mean asset
#   kc           - derived application: monthly Kc proxy (AET/PET) + annual mean asset
#   wue          - derived application: monthly WUE (GPP/AET) + annual mean asset
application: "all"

# -----------------------------------------------------------------------------
# EXPORT SETTINGS
# -----------------------------------------------------------------------------
export:
  asset_root: "projects/shuvamdownscalinget/assets"
  overwrite: true             # true = delete and recreate existing target assets
  wait_for_tasks: true
  poll_interval_seconds: 30

# =============================================================================
# OUTPUT ASSET REFERENCE
# =============================================================================
#
# Asset                            Bands  Unit         Description
# -----------------------------------------------------------------------------
# aet_<TEHSIL>_<YEAR>              13     mixed        Bands 1-12: mean daily AET; band 13: annual total AET
# pet_<TEHSIL>_<YEAR>              13     mixed        Bands 1-12: mean daily PET; band 13: annual total PET
# rwdi_<TEHSIL>_<YEAR>             13     %            RWDI per month + annual mean
# kc_<TEHSIL>_<YEAR>               13     ratio        Kc proxy (AET/PET) per month + annual mean
# gpp_<TEHSIL>_<YEAR>              13     g C/m2/day   GPP per month + annual mean
# wue_<TEHSIL>_<YEAR>              13     g C/kg H2O   WUE per month + annual mean
#
# Notes:
# - Exported bands remain in the same monthly/annual order expected by the
#   existing GEE viewer scripts (`b1` ... `b13`).
# - NoData value written into exported assets: -9999
# - Each asset receives image properties such as `valid_pixel_count`,
#   optional `grid_pixel_count`, band descriptions, formulas, and
#   source metadata.
# =============================================================================
