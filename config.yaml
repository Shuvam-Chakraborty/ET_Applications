# =============================================================================
#  ET-Applications — User Configuration File  (GeoTIFF Raster Edition)
#  Generates multi-band GeoTIFF rasters at 30 m resolution for the tehsil.
#  All output files are spatially aligned and can be opened in QGIS, ArcGIS,
#  or any GDAL/rasterio-based workflow.
# =============================================================================

# -----------------------------------------------------------------------------
# GEE PROJECT
# -----------------------------------------------------------------------------
gee_project: "shuvamdownscalinget"          # Your GEE cloud project ID

# -----------------------------------------------------------------------------
# TEHSIL IDENTIFICATION
# (Used for labelling output files only — the actual geometry comes from
#  the GEE asset below.)
# -----------------------------------------------------------------------------
tehsil:
  state    : "UTTAR PRADESH"
  district : "BANDA"
  name     : "TELYANI"

# -----------------------------------------------------------------------------
# GEE ASSET PATHS
# -----------------------------------------------------------------------------
assets:
  # The tehsil boundary FeatureCollection.
  tehsil_asset : "projects/shuvamdownscalinget/assets/tehsil_uttar_pradesh__banda__telyani"

  # The Random Forest model for 30 m AET downscaling.
  model_aez    : "projects/shuvamdownscalinget/assets/rf_aez4_final"

# -----------------------------------------------------------------------------
# MODIS COLLECTION  (PET source for RWDI and Water Stress)
# -----------------------------------------------------------------------------
modis:
  collection: "MODIS/061/MOD16A2"

# -----------------------------------------------------------------------------
# TIME PARAMETERS
# -----------------------------------------------------------------------------
time:
  year : 2022          # Year to process (Landsat 8 scenes + MODIS)

# -----------------------------------------------------------------------------
# COMPUTATION SETTINGS
# -----------------------------------------------------------------------------
compute:
  # chunk_size: approximate number of 30 m pixels per download tile.
  # The script tiles the bounding box so each GEE getDownloadURL request
  # covers ~chunk_size pixels. Safe default = 25000.
  # If you get "User memory limit exceeded" errors → lower to 5000 or 1000.
  # If downloads are very slow → raise to 50000.
  chunk_size: 3000

# -----------------------------------------------------------------------------
# APPLICATION TO RUN
# -----------------------------------------------------------------------------
# Options:
#   all          — monthly AET, annual ET, PET, RWDI, Water Stress  (default)
#   monthly_et   — only monthly AET GeoTIFF
#   annual_et    — monthly AET + annual total ET GeoTIFF
#   pet          — monthly PET GeoTIFF (MODIS)
#   rwdi         — monthly RWDI + annual mean GeoTIFF
#   water_stress — monthly Water Stress + annual mean GeoTIFF
application: "all"

# -----------------------------------------------------------------------------
# OUTPUT SETTINGS
# -----------------------------------------------------------------------------
output:
  directory: "./results"     # GeoTIFF and PNG files are written here
  plot      : true           # Set to false to skip matplotlib plots

# -----------------------------------------------------------------------------
# OPTIONAL: SAMPLE POINT TIME SERIES
# If provided, a 4-panel monthly timeseries plot is generated for the
# pixel nearest to this location. No additional GEE calls are made.
# -----------------------------------------------------------------------------
# sample_point:
#   lon: 80.7314
#   lat: 25.9735

# =============================================================================
# OUTPUT GEOTIFF REFERENCE
# =============================================================================
#
# File                              Bands  Unit       Description
# ────────────────────────────────────────────────────────────────────────────
# monthly_et_<TEHSIL>_<YEAR>.tif    12    mm/day     Mean daily AET per month
# annual_et_<TEHSIL>_<YEAR>.tif      1    mm/yr      Annual total AET
# pet_<TEHSIL>_<YEAR>.tif           12    mm/day     Mean daily PET per month
# rwdi_<TEHSIL>_<YEAR>.tif          13    %          RWDI per month + band 13
#                                                    = annual mean
# water_stress_<TEHSIL>_<YEAR>.tif  13    ratio 0-1  AET/PET per month + band
#                                                    13 = annual mean
#
# Band descriptions are embedded in every GeoTIFF.
# Open in QGIS: Layer > Add Layer > Add Raster Layer, then select bands in
# the Layer Styling panel.
#
# NoData value: -9999 (applied to pixels outside the tehsil boundary and to
# pixels where MODIS PET has no data).
#
# All GeoTIFFs produced by one run share the same CRS, transform, and
# 30 m pixel grid — they can be overlaid without reprojection.
# =============================================================================
